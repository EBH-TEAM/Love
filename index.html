<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>EBH TEAM - মোবাইল ব্রাউজার</title>
    <!-- Font Awesome for real icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* স্টারি নাইট ব্যাকগ্রাউন্ড - তারামাখা আকাশ */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0f2a 0%, #03050b 100%);
            z-index: -2;
        }

        /* তারাগুলো */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* ব্রাউজার টুলবার - মোবাইল ফ্রেন্ডলি */
        .browser-toolbar {
            background: rgba(18, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 0.5px solid rgba(255, 215, 0, 0.2);
        }

        /* নেভিগেশন বাটন গ্রুপ */
        .nav-group {
            display: flex;
            gap: 6px;
            background: rgba(30, 30, 45, 0.7);
            padding: 4px 8px;
            border-radius: 40px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* সার্চ বক্স - ডান দিকে ছোট */
        .search-area {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .search-box {
            background: rgba(30, 30, 45, 0.9);
            border-radius: 30px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 220px;
            width: 100%;
            border: 0.5px solid rgba(255, 215, 0, 0.3);
        }

        .search-box i {
            color: #FFD700;
            font-size: 13px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 13px;
            outline: none;
            width: 100%;
            font-family: monospace;
        }

        .search-box input::placeholder {
            color: #888;
            font-size: 12px;
        }

        .go-icon {
            background: #FF0000;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* হোমপেজ */
        .homepage {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            position: relative;
            z-index: 1;
        }

        /* শর্টকাট গ্রিড - মোবাইল ফ্রেন্ডলি */
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .shortcut:active {
            transform: scale(0.94);
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: #1e1e30;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
        }

        .shortcut span:last-child {
            color: #ccc;
            font-size: 11px;
            font-weight: 500;
        }

        /* ভিডিউয়ার (পূর্ণ পৃষ্ঠা) */
        .viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .viewer-header {
            background: #111118;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .close-viewer {
            background: #2a2a3a;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }

        .viewer-url {
            flex: 1;
            background: #222230;
            padding: 8px 14px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .viewer-go {
            background: #FF0000;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .viewer-iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #FFD700;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }

        @media (max-width: 480px) {
            .shortcuts-grid {
                gap: 16px 10px;
            }
            .icon-circle {
                width: 50px;
                height: 50px;
                font-size: 26px;
            }
            .search-box {
                max-width: 180px;
                padding: 6px 12px;
            }
            .nav-btn {
                width: 34px;
                height: 34px;
            }
        }
    </style>
</head>
<body>

<!-- তারামাখা ব্যাকগ্রাউন্ড -->
<div class="stars" id="stars"></div>

<!-- টুলবার -->
<div class="browser-toolbar">
    <div class="nav-group">
        <button class="nav-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
        <button class="nav-btn" id="forwardBtn"><i class="fas fa-arrow-right"></i></button>
        <button class="nav-btn" id="homeBtn"><i class="fas fa-home"></i></button>
    </div>
    <div class="search-area">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="urlInput" placeholder="লিংক বা সার্চ...">
            <button class="go-icon" id="goBtn"><i class="fas fa-arrow-right"></i></button>
        </div>
    </div>
</div>

<!-- হোমপেজ (শর্টকাট) -->
<div class="homepage" id="homepage">
    <div class="shortcuts-grid" id="shortcutsGrid"></div>
</div>

<!-- ভিউয়ার -->
<div class="viewer" id="viewer">
    <div class="viewer-header">
        <button class="close-viewer" id="closeViewer"><i class="fas fa-times"></i></button>
        <div class="viewer-url" id="viewerUrl"></div>
        <button class="viewer-go" id="viewerGoBtn">Go</button>
    </div>
    <iframe class="viewer-iframe" id="viewerIframe"></iframe>
</div>

<div class="loading" id="loading"><i class="fas fa-spinner fa-pulse"></i> লোড হচ্ছে...</div>

<script>
    // ==================================================
    // 🔴🔴🔴 শুধুমাত্র এখানে আপনার লিংক বসান 🔴🔴🔴
    // ==================================================
    const DEFAULT_LINK = "https://youtube.com/@ebh_5";
    
    // ==================================================
    
    // শর্টকাট লিস্ট - রিয়েল আইকন সহ (টিকটকের রং পরিবর্তন করা হয়েছে)
    const shortcuts = [
        { name: "YouTube", icon: "fab fa-youtube", color: "#FF0000", url: "https://youtube.com/@ebh_5" },
        { name: "Facebook", icon: "fab fa-facebook-f", color: "#1877F2", url: "https://facebook.com" },
        { name: "Instagram", icon: "fab fa-instagram", color: "#E4405F", url: "https://instagram.com" },
        { name: "WhatsApp", icon: "fab fa-whatsapp", color: "#25D366", url: "https://web.whatsapp.com" },
        { name: "Google", icon: "fab fa-google", color: "#4285F4", url: "https://google.com" },
        { name: "Gmail", icon: "fas fa-envelope", color: "#EA4335", url: "https://gmail.com" },
        { name: "X (Twitter)", icon: "fab fa-x-twitter", color: "#1DA1F2", url: "https://x.com" },
        { name: "TikTok", icon: "fab fa-tiktok", color: "#00f2ea", url: "https://tiktok.com" },  // 🔴 টিকটকের কালার চেঞ্জ করা হয়েছে সায়ান/টিফানি ব্লুতে
        { name: "Telegram", icon: "fab fa-telegram", color: "#26A5E4", url: "https://web.telegram.org" },
        { name: "LinkedIn", icon: "fab fa-linkedin-in", color: "#0A66C2", url: "https://linkedin.com" }
    ];
    
    // DOM elements
    const homepage = document.getElementById('homepage');
    const viewer = document.getElementById('viewer');
    const viewerIframe = document.getElementById('viewerIframe');
    const viewerUrl = document.getElementById('viewerUrl');
    const urlInput = document.getElementById('urlInput');
    const loadingDiv = document.getElementById('loading');
    
    let historyStack = [];
    let historyIndex = -1;
    
    // তারামাখা আকাশ তৈরির ফাংশন
    function createStars() {
        const starsContainer = document.getElementById('stars');
        starsContainer.innerHTML = '';
        const starCount = 150;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 1 + 's';
            starsContainer.appendChild(star);
        }
    }
    
    // YouTube link converter
    function convertToEmbed(link) {
        if (!link) return link;
        
        let match = link.match(/youtube\.com\/@([^\/?]+)/);
        if (match) return `https://www.youtube.com/embed?listType=user_uploads&list=${match[1]}`;
        
        match = link.match(/youtube\.com\/c\/([^\/?]+)/);
        if (match) return `https://www.youtube.com/embed?listType=user_uploads&list=${match[1]}`;
        
        match = link.match(/youtube\.com\/channel\/([^\/?]+)/);
        if (match) return `https://www.youtube.com/embed?listType=user_uploads&list=${match[1]}`;
        
        match = link.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&?#]+)/);
        if (match) return `https://www.youtube.com/embed/${match[1]}`;
        
        match = link.match(/youtube\.com\/shorts\/([^&?#]+)/);
        if (match) return `https://www.youtube.com/embed/${match[1]}`;
        
        return link;
    }
    
    // Open link
    function openLink(link, addToHistory = true) {
        if (!link) return;
        
        if (!link.startsWith('http://') && !link.startsWith('https://')) {
            link = 'https://' + link;
        }
        
        urlInput.value = link;
        viewerUrl.textContent = link;
        
        const finalUrl = convertToEmbed(link);
        viewerIframe.src = finalUrl;
        
        if (addToHistory) {
            historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(link);
            historyIndex++;
        }
        
        homepage.style.display = 'none';
        viewer.style.display = 'flex';
        showLoading();
    }
    
    // Show homepage
    function showHomepage() {
        homepage.style.display = 'block';
        viewer.style.display = 'none';
        viewerIframe.src = 'about:blank';
        urlInput.value = '';
    }
    
    // Show loading
    function showLoading() {
        loadingDiv.style.display = 'block';
        setTimeout(() => {
            loadingDiv.style.display = 'none';
        }, 800);
    }
    
    // Create shortcuts with real icons
    function createShortcuts() {
        const grid = document.getElementById('shortcutsGrid');
        grid.innerHTML = '';
        
        shortcuts.forEach(shortcut => {
            const div = document.createElement('div');
            div.className = 'shortcut';
            div.onclick = () => openLink(shortcut.url);
            div.innerHTML = `
                <div class="icon-circle" style="background: ${shortcut.color}20; border: 1px solid ${shortcut.color}40;">
                    <i class="${shortcut.icon}" style="color: ${shortcut.color}; font-size: 26px;"></i>
                </div>
                <span>${shortcut.name}</span>
            `;
            grid.appendChild(div);
        });
    }
    
    // Event listeners
    document.getElementById('goBtn').addEventListener('click', () => openLink(urlInput.value));
    document.getElementById('viewerGoBtn').addEventListener('click', () => openLink(viewerUrl.textContent));
    document.getElementById('closeViewer').addEventListener('click', showHomepage);
    document.getElementById('homeBtn').addEventListener('click', showHomepage);
    
    document.getElementById('backBtn').addEventListener('click', () => {
        if (historyIndex > 0) {
            historyIndex--;
            openLink(historyStack[historyIndex], false);
        }
    });
    
    document.getElementById('forwardBtn').addEventListener('click', () => {
        if (historyIndex < historyStack.length - 1) {
            historyIndex++;
            openLink(historyStack[historyIndex], false);
        }
    });
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') openLink(urlInput.value);
    });
    
    viewerIframe.addEventListener('load', showLoading);
    
    // Initialize
    createStars();  // তারামাখা আকাশ তৈরি
    createShortcuts();
    
    // Load default link on start
    setTimeout(() => {
        openLink(DEFAULT_LINK);
    }, 100);
</script>

</body>
</html>
