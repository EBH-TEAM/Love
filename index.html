<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>EBH TEAM - মোবাইল ব্রাউজার</title>
    <!-- Font Awesome for real icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* স্টারি নাইট ব্যাকগ্রাউন্ড */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0f2a 0%, #03050b 100%);
            z-index: -2;
        }

        /* তারাগুলো */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* ব্রাউজার টুলবার */
        .browser-toolbar {
            background: rgba(18, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 0.5px solid rgba(255, 215, 0, 0.2);
        }

        .nav-group {
            display: flex;
            gap: 6px;
            background: rgba(30, 30, 45, 0.7);
            padding: 4px 8px;
            border-radius: 40px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* সার্চ বক্স */
        .search-area {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .search-box {
            background: rgba(30, 30, 45, 0.9);
            border-radius: 30px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 220px;
            width: 100%;
            border: 0.5px solid rgba(255, 215, 0, 0.3);
        }

        .search-box i {
            color: #FFD700;
            font-size: 13px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 13px;
            outline: none;
            width: 100%;
            font-family: monospace;
        }

        .search-box input::placeholder {
            color: #888;
            font-size: 12px;
        }

        .go-icon {
            background: #FF0000;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* হোমপেজ */
        .homepage {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            position: relative;
            z-index: 1;
        }

        /* শর্টকাট গ্রিড */
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .shortcut:active {
            transform: scale(0.94);
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: #1e1e30;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
        }

        .shortcut span:last-child {
            color: #ccc;
            font-size: 11px;
            font-weight: 500;
        }

        /* ডিফল্ট ভিউয়ার - এখন রিডাইরেক্ট ব্যবহার করব */
        .info-message {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 480px) {
            .shortcuts-grid {
                gap: 16px 10px;
            }
            .icon-circle {
                width: 50px;
                height: 50px;
                font-size: 26px;
            }
            .search-box {
                max-width: 180px;
                padding: 6px 12px;
            }
            .nav-btn {
                width: 34px;
                height: 34px;
            }
        }
    </style>
</head>
<body>

<!-- তারামাখা ব্যাকগ্রাউন্ড -->
<div class="stars" id="stars"></div>

<!-- টুলবার -->
<div class="browser-toolbar">
    <div class="nav-group">
        <button class="nav-btn" id="homeBtn"><i class="fas fa-home"></i></button>
    </div>
    <div class="search-area">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="urlInput" placeholder="লিংক বা সার্চ...">
            <button class="go-icon" id="goBtn"><i class="fas fa-arrow-right"></i></button>
        </div>
    </div>
</div>

<!-- হোমপেজ (শর্টকাট) -->
<div class="homepage" id="homepage">
    <div class="shortcuts-grid" id="shortcutsGrid"></div>
</div>

<!-- ইনফো মেসেজ (যখন কিছু খোলা নেই) -->
<div class="info-message" id="infoMessage" style="display: none;">
    <div>
        <i class="fas fa-globe" style="font-size: 48px; color: #FFD700; margin-bottom: 15px; display: block;"></i>
        <p>শর্টকাটে ক্লিক করুন বা লিংক দিন</p>
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.6;">YouTube, Facebook সরাসরি খুলবে</p>
    </div>
</div>

<script>
    // ==================================================
    // 🔴🔴🔴 শুধুমাত্র এখানে আপনার লিংক বসান 🔴🔴🔴
    // ==================================================
    const DEFAULT_LINK = "";
    
    // ==================================================
    
    // শর্টকাট লিস্ট - রিয়েল আইকন সহ
    const shortcuts = [
        { name: "YouTube", icon: "fab fa-youtube", color: "#FF0000", url: "https://youtube.com/@ebh_5" },
        { name: "Facebook", icon: "fab fa-facebook-f", color: "#1877F2", url: "https://facebook.com" },
        { name: "Instagram", icon: "fab fa-instagram", color: "#E4405F", url: "https://instagram.com" },
        { name: "WhatsApp", icon: "fab fa-whatsapp", color: "#25D366", url: "https://web.whatsapp.com" },
        { name: "Google", icon: "fab fa-google", color: "#4285F4", url: "https://google.com" },
        { name: "Gmail", icon: "fas fa-envelope", color: "#EA4335", url: "https://gmail.com" },
        { name: "X (Twitter)", icon: "fab fa-x-twitter", color: "#1DA1F2", url: "https://x.com" },
        { name: "TikTok", icon: "fab fa-tiktok", color: "#00f2ea", url: "https://tiktok.com" },
        { name: "Telegram", icon: "fab fa-telegram", color: "#26A5E4", url: "https://web.telegram.org" },
        { name: "LinkedIn", icon: "fab fa-linkedin-in", color: "#0A66C2", url: "https://linkedin.com" }
    ];
    
    // DOM elements
    const homepage = document.getElementById('homepage');
    const infoMessage = document.getElementById('infoMessage');
    const urlInput = document.getElementById('urlInput');
    
    // তারামাখা আকাশ তৈরির ফাংশন
    function createStars() {
        const starsContainer = document.getElementById('stars');
        starsContainer.innerHTML = '';
        const starCount = 150;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 1 + 's';
            starsContainer.appendChild(star);
        }
    }
    
    // লিংক ওপেন করা - সরাসরি location.href দিয়ে (iframe ছাড়া)
    function openLink(link) {
        if (!link) return;
        
        if (!link.startsWith('http://') && !link.startsWith('https://')) {
            link = 'https://' + link;
        }
        
        // সরাসরি পেজ রিডাইরেক্ট - এতে ব্লক হবে না
        window.location.href = link;
    }
    
    // হোমপেজ দেখানো
    function showHomepage() {
        homepage.style.display = 'block';
        infoMessage.style.display = 'none';
        urlInput.value = '';
    }
    
    // শর্টকাট তৈরি
    function createShortcuts() {
        const grid = document.getElementById('shortcutsGrid');
        grid.innerHTML = '';
        
        shortcuts.forEach(shortcut => {
            const div = document.createElement('div');
            div.className = 'shortcut';
            div.onclick = () => openLink(shortcut.url);
            div.innerHTML = `
                <div class="icon-circle" style="background: ${shortcut.color}20; border: 1px solid ${shortcut.color}40;">
                    <i class="${shortcut.icon}" style="color: ${shortcut.color}; font-size: 26px;"></i>
                </div>
                <span>${shortcut.name}</span>
            `;
            grid.appendChild(div);
        });
    }
    
    // Event listeners
    document.getElementById('goBtn').addEventListener('click', () => {
        if (urlInput.value.trim()) {
            openLink(urlInput.value);
        }
    });
    
    document.getElementById('homeBtn').addEventListener('click', () => {
        // হোম বাটনে ক্লিক করলে ডিফল্ট লিংকে যাবে
        openLink(DEFAULT_LINK);
    });
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && urlInput.value.trim()) {
            openLink(urlInput.value);
        }
    });
    
    // Initialize
    createStars();
    createShortcuts();
    
    // পেজ লোড হলে ডিফল্ট লিংকে যাবে (সরাসরি YouTube চ্যানেল)
    setTimeout(() => {
        openLink(DEFAULT_LINK);
    }, 100);
</script>

</body>
</html>
