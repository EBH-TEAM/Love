<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBH TEAM - ভিডিও প্লেয়ার</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-box {
            width: 100%;
            max-width: 800px;
            margin: 40px 20px;
        }

        .video-box iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="video-box">
        <iframe 
            id="player"
            src="https://www.youtube.com/embed/UIHPyruiZBY" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // ✅ ভিডিও পরিবর্তন করতে এখানে শুধু আইডি দিন
        const videoID = 'UIHPyruiZBY';
        document.getElementById('player').src = 'https://www.youtube.com/embed/' + videoID;
    </script>
</body>
</html>
